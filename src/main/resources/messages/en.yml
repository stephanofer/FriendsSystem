config-version: 1

help.header: "<gradient:#6fffe9:#5bc0be><bold>FriendsSystem</bold></gradient> <gray>Available commands</gray>"
help.add: "<dark_gray>•</dark_gray> <aqua>/{command} add <player></aqua> <gray>Send a friend request.</gray>"
help.accept: "<dark_gray>•</dark_gray> <aqua>/{command} accept <player></aqua> <gray>Accept a request.</gray>"
help.deny: "<dark_gray>•</dark_gray> <aqua>/{command} deny <player></aqua> <gray>Deny a request.</gray>"
help.withdraw: "<dark_gray>•</dark_gray> <aqua>/{command} withdraw <player></aqua> <gray>Withdraw a sent request.</gray>"
help.remove: "<dark_gray>•</dark_gray> <aqua>/{command} remove <player></aqua> <gray>Remove a friend.</gray>"
help.list: "<dark_gray>•</dark_gray> <aqua>/{command} list [page]</aqua> <gray>Show your friends and their activity.</gray>"
help.pending: "<dark_gray>•</dark_gray> <aqua>/{command} pending</aqua> <gray>Show pending requests.</gray>"
help.block: "<dark_gray>•</dark_gray> <aqua>/{command} block <player></aqua> <gray>Block a player.</gray>"
help.unblock: "<dark_gray>•</dark_gray> <aqua>/{command} unblock <player></aqua> <gray>Unblock a player.</gray>"
help.msg: "<dark_gray>•</dark_gray> <aqua>/{command} msg <player> <message></aqua> <gray>Send a private message.</gray>"
help.reply: "<dark_gray>•</dark_gray> <aqua>/{command} reply <message></aqua> <gray>Reply to the latest message.</gray>"
help.broadcast: "<dark_gray>•</dark_gray> <aqua>/{command} broadcast <message></aqua> <gray>Broadcast to your friends.</gray>"
help.toggle: "<dark_gray>•</dark_gray> <aqua>/{command} toggle <setting></aqua> <gray>Change your social preferences.</gray>"
player-only: "<red>Only players can use this command.</red>"
friend.not-found: "<red>I couldn't find <white>{player}</white>.</red>"
friend.self: "<red>You can't do that with yourself.</red>"
friend.limit: "<red>You reached your <white>{limit}</white> friends limit.</red>"
friend.limit-target: "<red><white>{player}</white> cannot accept more friends right now.</red>"
friend.already: "<yellow><white>{player}</white> is already your friend.</yellow>"
friend.not-friends: "<red><white>{player}</white> is not in your friend list.</red>"
friend.removed: "<green>Removed <white>{player}</white> from your friends.</green>"
request.sent: "<green>Friend request sent to <white>{player}</white>.</green>"
request.received: "<gradient:#6fffe9:#5bc0be><bold>Friend request</bold></gradient> <gray>from</gray> <white>{player}</white> <dark_gray>[</dark_gray><green><click:run_command:'{accept}'><hover:show_text:'<green>Accept request'>Accept</hover></click></green><dark_gray>]</dark_gray> <dark_gray>[</dark_gray><red><click:run_command:'{deny}'><hover:show_text:'<red>Deny request'>Deny</hover></click></red><dark_gray>]</dark_gray>"
request.actionbar: "<green>{player} wants to add you as a friend.</green>"
request.already: "<yellow>A request with <white>{player}</white> already exists.</yellow>"
request.crossed: "<yellow><white>{player}</white> already sent you a request. Use <white>/friend accept {player}</white>.</yellow>"
request.none: "<red>There is no pending request with <white>{player}</white>.</red>"
request.accepted: "<green>You are now friends with <white>{player}</white>.</green>"
request.accepted-target: "<green><white>{player}</white> accepted your friend request.</green>"
request.denied: "<yellow>You denied <white>{player}</white>'s request.</yellow>"
request.withdrawn: "<yellow>You withdrew your request to <white>{player}</white>.</yellow>"
block.added: "<green>Blocked <white>{player}</white>.</green>"
block.removed: "<green>Unblocked <white>{player}</white>.</green>"
block.none: "<yellow><white>{player}</white> was not blocked.</yellow>"
list.empty: "<gray>You don't have friends yet.</gray>"
list.header: "<gradient:#6fffe9:#5bc0be><bold>Friends</bold></gradient> <gray>page {page}/{pages} · {total} total</gray>"
list.entry: "<dark_gray>•</dark_gray> {prefix}<white>{player}</white> <gray>({group})</gray> <dark_gray>-</dark_gray> <aqua>{status}</aqua> <gray>{activity}</gray>"
pending.header: "<gradient:#6fffe9:#5bc0be><bold>Pending requests</bold></gradient>"
pending.incoming: "<gray>Incoming:</gray> <white>{players}</white>"
pending.outgoing: "<gray>Outgoing:</gray> <white>{players}</white>"
settings.unknown: "<red>Unknown setting: <white>{setting}</white>.</red>"
settings.changed: "<green><white>{setting}</white> is now <white>{value}</white>.</green>"
notify.join: "<gray>Your friend <white>{player}</white> joined.</gray>"
notify.quit: "<gray>Your friend <white>{player}</white> left.</gray>"
message.empty: "<red>The message is empty.</red>"
message.disabled: "<red><white>{player}</white> is not receiving friend messages.</red>"
message.sent: "<gray>You -> <white>{player}</white>:</gray> <white>{message}</white>"
message.received: "<gray><white>{player}</white> -> You:</gray> <white>{message}</white> <dark_gray>[</dark_gray><aqua><click:suggest_command:'/fr '><hover:show_text:'<aqua>Reply'>reply</hover></click></aqua><dark_gray>]</dark_gray>"
message.offline-stored: "<green><white>{player}</white> is offline. Your message was saved.</green>"
message.no-reply: "<red>You don't have anyone to reply to.</red>"
message.reply-offline: "<red>That player is no longer online.</red>"
message.broadcast-received: "<gradient:#ffd166:#ef476f><bold>Friend broadcast</bold></gradient> <white>{player}</white><gray>:</gray> <white>{message}</white>"
message.broadcast-sent: "<green>Broadcast sent to <white>{count}</white> online friends.</green>"
offline.header: "<gradient:#6fffe9:#5bc0be><bold>Offline messages</bold></gradient> <gray>{count} received</gray>"
offline.entry: "<dark_gray>•</dark_gray> <gray>{sender}:</gray> <white>{message}</white>"
