config-version: 3

database:
  host: "127.0.0.1"
  port: 3306
  database: "hera_network"
  username: "friends"
  password: "change-me"
  table-prefix: "friends_"

network-player-settings:
  enabled: true
  table-prefix: "nps_"
  default-language: "es"

redis:
  host: "127.0.0.1"
  port: 6379
  database: 0
  username: ""
  password: ""
  ssl: false
  key-prefix: "hera"
  environment: "prod"
  server-id: "velocity-1"

friends:
  request-expiration: "7d"
  default-limit: 50
  max-offline-messages: 20
  offline-message-expiration: "14d"
  page-size: 10
  message-max-length: 512

permissions:
  limit-prefix: "friendssystem.limit."
  default-limit: 50
  max-limit-scan: 500

commands:
  primary: "friends"
  aliases:
    - "friend"
  message-aliases:
    - "fmsg"
    - "fm"
  reply-aliases:
    - "fr"
  suggestions:
    cache-ttl: "5s"
    empty-input-max-results: 20
    filtered-max-results: 50
    query-max-results: 100

cache:
  friends-ttl: "2m"
  settings-ttl: "2m"
  activity-page-ttl: "5s"
  presence-ttl: "90s"

feedback:
  actions:
    request-received:
      outputs:
        - type: CHAT
          message: "request.received"
        - type: ACTION_BAR
          message: "request.actionbar"
        - type: SOUND
          sound: "minecraft:block.note_block.pling"
          source: "MASTER"
          volume: 1.0
          pitch: 1.4
    request-sent:
      outputs:
        - type: CHAT
          message: "request.sent"
    request-accepted:
      outputs:
        - type: CHAT
          message: "request.accepted"
    request-accepted-target:
      outputs:
        - type: CHAT
          message: "request.accepted-target"
    request-denied:
      outputs:
        - type: CHAT
          message: "request.denied"
    request-denied-target:
      outputs:
        - type: CHAT
          message: "request.denied-target"
        - type: SOUND
          sound: "minecraft:block.note_block.bass"
          source: "MASTER"
          volume: 1.0
          pitch: 0.8
    request-withdrawn:
      outputs:
        - type: CHAT
          message: "request.withdrawn"
    friend-removed:
      outputs:
        - type: CHAT
          message: "friend.removed"
    block-added:
      outputs:
        - type: CHAT
          message: "block.added"
    block-removed:
      outputs:
        - type: CHAT
          message: "block.removed"
    friend-message-sent:
      outputs:
        - type: CHAT
          message: "message.sent"
    friend-message-received:
      outputs:
        - type: CHAT
          message: "message.received"
    friend-broadcast-received:
      outputs:
        - type: CHAT
          message: "message.broadcast-received"
    friend-join:
      outputs:
        - type: CHAT
          message: "notify.join"
    friend-quit:
      outputs:
        - type: CHAT
          message: "notify.quit"
    offline-message-delivered:
      outputs:
        - type: CHAT
          message: "offline.header"
